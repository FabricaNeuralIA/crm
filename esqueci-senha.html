<!DOCTYPE html>
<html lang="pt-br" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha | Fábrica Neural</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
         body { 
            font-family: 'Inter', sans-serif; 
         }
         .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            width: 1rem; height: 1rem;
            animation: spin 1s linear infinite;
            display: inline-block; margin-right: 0.5rem;
         }
         @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<!-- FUNDO CLARO (IGUAL AO SCREENSHOT) -->
<body class="h-full bg-gray-50 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <!-- CARD BRANCO E LIMPO -->
    <div class="w-full max-w-md space-y-8 bg-white p-10 rounded-xl shadow-xl">
        
        <!-- LOGO E TÍTULO DA MARCA -->
        <div>
            <!-- Ícone Globo (Heroicons 'globe-alt') -->
            <svg class="mx-auto h-12 w-auto text-violet-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418" />
            </svg>
            <h1 class="mt-4 text-center text-3xl font-bold tracking-tight text-gray-900">
                Fabrica Neural
            </h1>
        </div>

        <div class="space-y-6">
            <div class="text-center">
                <h2 class="text-xl font-semibold text-gray-800">Recuperar Senha</h2>
                <p class="text-sm text-gray-600">
                    Digite seu e-mail para enviarmos o link de redefinição.
                </p>
            </div>
            
            <form id="request-form" class="space-y-6">
                <div>
                    <!-- Label removida para ficar igual ao login (placeholder-only) -->
                    <label for="email" class="sr-only">E-mail</label>
                    <input type="email" id="email" name="email" required
                           class="w-full px-4 py-3 text-gray-900 bg-white border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-violet-500 dark:bg-slate-700 dark:border-slate-600 dark:text-gray-200"
                           placeholder="Seu e-mail">
                </div>
                
                <button type="submit" id="submit-button"
                        class="w-full px-4 py-3 font-semibold text-white bg-violet-600 rounded-md shadow-lg hover:bg-violet-700 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:ring-offset-2 transition duration-300 flex items-center justify-center disabled:opacity-75">
                    <span id="submit-spinner" class="spinner hidden"></span>
                    <span id="submit-text">Enviar Link</span>
                </button>
            </form>
            
            <p id="message" class="text-center text-sm"></p>
            
            <div class="text-center">
                <a href="login.html" class="text-sm font-medium text-violet-600 hover:text-violet-500">Voltar para o Login</a>
            </div>
        </div>
    </div>

    <script>
        // ======================================================
        // ATENÇÃO: Crie este novo webhook público no seu n8n!
        // ======================================================
        const REQUEST_RESET_URL = 'https://auto.fabricaneural.ia.br/webhook/public/solicitar-reset-senha';

        const form = document.getElementById('request-form');
        const button = document.getElementById('submit-button');
        const submitText = document.getElementById('submit-text');
        const submitSpinner = document.getElementById('submit-spinner');
        const message = document.getElementById('message');

        function setButtonLoading(isLoading) {
            if (isLoading) {
                button.disabled = true;
                submitSpinner.classList.remove('hidden');
                submitText.textContent = 'Enviando...';
            } else {
                button.disabled = false;
                submitSpinner.classList.add('hidden');
                submitText.textContent = 'Enviar Link';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            message.textContent = '';
            setButtonLoading(true);

            const email = document.getElementById('email').value.trim();

            try {
                const response = await fetch(REQUEST_RESET_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                // Não precisamos ler o .json() aqui, a lógica de segurança
                // é tratar o 404 ou 500 da mesma forma que o 200.
                
                // if (response.ok) {
                //     ...
                // } else {
                //     throw new Error(data.message || 'E-mail não encontrado ou erro.');
                // }
                // ESSA LÓGICA É INSEGURA. A lógica abaixo é melhor.

            } catch (error) {
                // Independentemente do erro, NUNCA confirme ao usuário
                // se o e-mail existe ou não. Apenas mostre a mensagem de sucesso.
                console.error('Erro (ignorado pela UI):', error);
            } finally {
                // Sempre mostre essa mensagem
                form.style.display = 'none'; // Esconde o formulário
                
                // Limpa a área de branding para focar na mensagem
                const brandingDiv = document.querySelector('div.space-y-8 > div:first-child');
                if (brandingDiv) brandingDiv.style.display = 'none';

                message.textContent = 'Sucesso! Se o e-mail estiver cadastrado, você receberá um link em breve.';
                message.className = 'text-center text-lg font-medium text-green-600';
            }
        });
    </script>
</body>
</html>
