<!DOCTYPE html>
<html lang="pt-br" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fabrica Neural CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .bg-animation .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.05) 100%);
            animation: float 20s infinite ease-in-out;
        }

        .bg-animation .circle:nth-child(1) {
            width: 600px;
            height: 600px;
            top: -200px;
            right: -100px;
            animation-delay: 0s;
        }

        .bg-animation .circle:nth-child(2) {
            width: 400px;
            height: 400px;
            bottom: -150px;
            left: -100px;
            animation-delay: -5s;
        }

        .bg-animation .circle:nth-child(3) {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
            50% { transform: translateY(-30px) rotate(180deg); opacity: 0.8; }
        }

        /* Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        /* Logo Animation */
        .logo-container {
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .logo-glow {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 0 40px rgba(99, 102, 241, 0.4),
                0 0 80px rgba(139, 92, 246, 0.2);
            position: relative;
            overflow: hidden;
        }

        .logo-glow::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 40%,
                rgba(255, 255, 255, 0.1) 50%,
                transparent 60%
            );
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        /* Input Styles */
        .input-group {
            position: relative;
        }

        .input-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #6366f1;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
            outline: none;
        }

        .input-group .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            transition: color 0.3s ease;
        }

        .input-group input:focus + .input-icon,
        .input-group input:not(:placeholder-shown) + .input-icon {
            color: #6366f1;
        }

        /* Button Styles */
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: left 0.5s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Checkbox Custom */
        .custom-checkbox {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .custom-checkbox:checked {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-color: transparent;
        }

        .custom-checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        /* Links */
        .link-hover {
            position: relative;
            color: #a5b4fc;
            transition: color 0.3s ease;
        }

        .link-hover::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            transition: width 0.3s ease;
        }

        .link-hover:hover {
            color: #c7d2fe;
        }

        .link-hover:hover::after {
            width: 100%;
        }

        /* Error Message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: flex;
            align-items: center;
            gap: 8px;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: color 0.3s ease;
            background: none;
            border: none;
            padding: 4px;
        }

        .password-toggle:hover {
            color: #6366f1;
        }

        /* Mobile Responsive */
        @media (max-width: 640px) {
            .glass-card {
                margin: 16px;
                padding: 32px 24px !important;
            }

            .logo-glow {
                width: 64px;
                height: 64px;
                border-radius: 18px;
            }

            .logo-glow i {
                font-size: 28px !important;
            }

            h1 {
                font-size: 1.75rem !important;
            }

            h2 {
                font-size: 0.875rem !important;
            }
        }

        /* Loading State */
        .btn-loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .btn-loading .btn-text {
            visibility: hidden;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="h-full flex items-center justify-center p-4">
    
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <!-- Login Card -->
    <div class="glass-card rounded-3xl p-10 w-full max-w-md relative z-10">
        
        <!-- Logo -->
        <div class="logo-container flex flex-col items-center mb-8">
            <div class="logo-glow mb-4">
                <i class="bi bi-cpu text-white text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">
                Fabrica Neural
            </h1>
            <h2 class="text-indigo-300 mt-2 text-sm font-medium">
                Acesse seu CRM Inteligente
            </h2>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="error-message mb-4">
            <i class="bi bi-exclamation-circle"></i>
            <span id="error-text"></span>
        </div>

        <!-- Form -->
        <form id="login-form" class="space-y-5">
            
            <!-- Email Input -->
            <div class="input-group">
                <input 
                    type="email" 
                    id="email" 
                    name="email"
                    required
                    autocomplete="email"
                    placeholder="Seu email"
                    class="w-full pl-12 pr-4 py-4 rounded-xl text-base"
                >
                <i class="bi bi-envelope input-icon text-lg"></i>
            </div>

            <!-- Password Input -->
            <div class="input-group">
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    required
                    autocomplete="current-password"
                    placeholder="Sua senha"
                    class="w-full pl-12 pr-12 py-4 rounded-xl text-base"
                >
                <i class="bi bi-lock input-icon text-lg"></i>
                <button type="button" id="togglePassword" class="password-toggle">
                    <i class="bi bi-eye text-lg" id="eye-icon"></i>
                    <i class="bi bi-eye-slash text-lg hidden" id="eye-off-icon"></i>
                </button>
            </div>

            <!-- Remember & Forgot -->
            <div class="flex items-center justify-between">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="remember-me" class="custom-checkbox">
                    <span class="text-sm text-gray-400">Lembrar-me</span>
                </label>
                <a href="esqueci-senha.html" class="text-sm link-hover">
                    Esqueceu a senha?
                </a>
            </div>

            <!-- Submit Button -->
            <button 
                type="submit" 
                id="submit-btn"
                class="btn-primary w-full py-4 rounded-xl text-white font-semibold text-base flex items-center justify-center gap-2 mt-6"
            >
                <span class="btn-text flex items-center gap-2">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Entrar
                </span>
            </button>
        </form>

        <!-- Divider -->
        <div class="divider my-6">
            <span>ou</span>
        </div>

        <!-- Create Account -->
        <div class="text-center">
            <p class="text-gray-400 text-sm">
                Não tem uma conta?
                <a href="https://admin.fabricaneural.ia.br/cadastro" class="link-hover font-medium ml-1">
                    Crie sua conta
                </a>
            </p>
        </div>

        <!-- Footer -->
        <div class="mt-8 pt-6 border-t border-white/10 text-center">
            <p class="text-gray-500 text-xs">
                © 2025 Fabrica Neural. Todos os direitos reservados.
            </p>
        </div>
    </div>

    <script src="assets/api.js"></script>
    <script src="assets/auth.js"></script>
    <script>
        // Password Toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        const eyeOffIcon = document.getElementById('eye-off-icon');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.classList.toggle('hidden');
            eyeOffIcon.classList.toggle('hidden');
        });

        // Form Submit
        const loginForm = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = passwordInput.value;
            
            // Hide previous error
            errorMessage.classList.remove('show');
            
            // Show loading
            submitBtn.classList.add('btn-loading');
            
            try {
                await login(email, password);
            } catch (error) {
                console.error('Erro no login:', error);
                errorText.textContent = error.message || 'Erro ao fazer login. Tente novamente.';
                errorMessage.classList.add('show');
                submitBtn.classList.remove('btn-loading');
            }
        });

        // Add input animations
        document.querySelectorAll('.input-group input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('focused');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('focused');
            });
        });
    </script>
</body>
</html>
