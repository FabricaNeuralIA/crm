<!DOCTYPE html>
<html lang="pt-br" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha | Fábrica Neural</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
         body { font-family: 'Inter', sans-serif; }
         .password-strength { font-size: 0.75rem; margin-top: 0.25rem; }
         .strength-weak { color: #ef4444; } .strength-medium { color: #f59e0b; } .strength-strong { color: #10b981; }
         .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            width: 1rem; height: 1rem;
            animation: spin 1s linear infinite;
            display: inline-block; margin-right: 0.5rem;
         }
         @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-full bg-gray-50 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8 bg-white p-10 rounded-xl shadow-xl">
        
        <div>
            <svg class="mx-auto h-12 w-auto text-violet-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418" />
            </svg>
            <h1 class="mt-4 text-center text-3xl font-bold tracking-tight text-gray-900">
                Fabrica Neural
            </h1>
        </div>

        <div class="space-y-6">
            <div class="text-center">
                <h2 class="text-xl font-semibold text-gray-800">Crie sua Nova Senha</h2>
                <p class="text-sm text-gray-600">
                    Digite e confirme sua nova senha de acesso.
                </p>
            </div>
        
            <form id="reset-form" class="space-y-6">
                <input type="hidden" id="token" name="token">

                <div>
                    <label for="password" class="sr-only">Nova Senha</label>
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-3 mt-2 text-gray-900 bg-white border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-violet-500"
                           placeholder="Digite a nova senha">
                    <p id="password-strength" class="password-strength"></p>
                </div>

                 <div>
                    <label for="password-confirm" class="sr-only">Confirme a Nova Senha</label>
                    <input type="password" id="password-confirm" name="password-confirm" required
                           class="w-full px-4 py-3 mt-2 text-gray-900 bg-white border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-violet-500"
                           placeholder="Confirme a nova senha">
                </div>
                
                <button type="submit" id="submit-button"
                        class="w-full px-4 py-3 font-semibold text-white bg-violet-600 rounded-md shadow-lg hover:bg-violet-700 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:ring-offset-2 transition duration-300 flex items-center justify-center disabled:opacity-75">
                    <span id="submit-spinner" class="spinner hidden"></span>
                    <span id="submit-text">Salvar Nova Senha</span>
                </button>
            </form>
            
            <p id="message" class="text-center text-sm"></p>

            <div class="text-center">
                <a href="login.html" class="text-sm font-medium text-violet-600 hover:text-violet-500">Voltar para o Login</a>
            </div>
        </div>
    </div>

    <script>
        // ======================================================
        // ATENÇÃO: Webhook que EXECUTA a troca de senha
        // ======================================================
        const RESET_PASSWORD_URL = 'https://auto.fabricaneural.ia.br/webhook/public/executar-reset-senha';

        // Elementos
        const form = document.getElementById('reset-form');
        const passwordInput = document.getElementById('password');
        const passwordConfirmInput = document.getElementById('password-confirm');
        const tokenInput = document.getElementById('token');
        const strengthText = document.getElementById('password-strength');
        const message = document.getElementById('message');
        const button = document.getElementById('submit-button');
        const submitText = document.getElementById('submit-text');
        const submitSpinner = document.getElementById('submit-spinner');

        // ===============================================
        // FUNÇÕES DE VALIDAÇÃO E LOADING
        // ===============================================

        function setButtonLoading(isLoading) {
            if (isLoading) {
                button.disabled = true;
                submitSpinner.classList.remove('hidden');
                submitText.textContent = 'Salvando...';
            } else {
                button.disabled = false;
                submitSpinner.classList.add('hidden');
                submitText.textContent = 'Salvar Nova Senha';
            }
        }

        function validatePassword(password) {
            const minLength = password.length >= 8;
            const hasUppercase = /[A-Z]/.test(password);
            const hasLowercase = /[a-z]/.test(password);
            const hasNumber = /\d/.test(password);
            const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);

            const strength = 
                (minLength ? 1 : 0) + (hasUppercase ? 1 : 0) +
                (hasLowercase ? 1 : 0) + (hasNumber ? 1 : 0) + (hasSpecial ? 1 : 0);

            return {
                valid: minLength && hasUppercase && hasLowercase && hasNumber && hasSpecial,
                minLength, hasUppercase, hasLowercase, hasNumber, hasSpecial,
                strength
            };
        }

        function updateStrengthFeedback(result) {
            if (result.strength === 0 && passwordInput.value.length === 0) {
                strengthText.textContent = '';
                return;
            }

            let msg = '';
            let className = '';

            if (result.strength <= 2) {
                msg = 'Fraca: ';
                className = 'strength-weak';
            } else if (result.strength <= 4) {
                msg = 'Média: ';
                className = 'strength-medium';
            } else {
                msg = 'Forte! ';
                className = 'strength-strong';
            }

            const checks = [];
            if (!result.minLength) checks.push('8+ caracteres');
            if (!result.hasUppercase) checks.push('1 maiúscula');
            if (!result.hasLowercase) checks.push('1 minúscula');
            if (!result.hasNumber) checks.push('1 número');
            if (!result.hasSpecial) checks.push('1 símbolo');

            if (checks.length > 0) {
                msg += checks.join(', ');
            } else {
                msg += 'Tudo certo!';
            }

            strengthText.textContent = msg;
            strengthText.className = `password-strength ${className}`;
        }


        // ===============================================
        // LÓGICA DA PÁGINA
        // ===============================================

        // Função para pegar o token da URL
        function getTokenFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const token = getTokenFromURL();
            if (!token) {
                form.style.display = 'none';
                message.textContent = 'Link inválido ou expirado.';
                message.className = 'text-center text-lg font-medium text-red-600';
                return;
            }
            tokenInput.value = token; // Salva o token no campo oculto
            
            // Listener para feedback da senha
            passwordInput.addEventListener('input', () => {
                const password = passwordInput.value;
                const result = validatePassword(password);
                updateStrengthFeedback(result);
            });

            form.addEventListener('submit', handleFormSubmit);
        });

        async function handleFormSubmit(e) {
            e.preventDefault();
            message.textContent = '';
            
            const password = passwordInput.value;
            const passwordConfirm = passwordConfirmInput.value;
            const token = tokenInput.value;

            // Validação final da senha
            const validation = validatePassword(password);
            if (!validation.valid) {
                let errorMsg = 'Senha inválida. Requisitos: ';
                const checks = [];
                if (!validation.minLength) checks.push('8+ caracteres');
                if (!validation.hasUppercase) checks.push('1 maiúscula');
                if (!validation.hasLowercase) checks.push('1 minúscula');
                if (!validation.hasNumber) checks.push('1 número');
                if (!validation.hasSpecial) checks.push('1 símbolo');
                
                message.textContent = errorMsg + checks.join(', ');
                message.className = 'text-center text-sm text-red-500';
                return;
            }

            if (password !== passwordConfirm) {
                 message.textContent = 'As senhas não são iguais.';
                 message.className = 'text-center text-sm text-red-500';
                 return;
            }
            
            setButtonLoading(true);

            try {
                const response = await fetch(RESET_PASSWORD_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password }) // Envia o token e a nova senha
                });

                const data = await response.json();

                if (response.ok) {
                    form.style.display = 'none';
                    message.textContent = 'Sucesso! Sua senha foi alterada. Você já pode fazer login.';
                    message.className = 'text-center text-lg font-medium text-green-600';
                    // Opcional: redirecionar para o login
                    // setTimeout(() => { window.location.href = 'login.html'; }, 3000);
                } else {
                    throw new Error(data.message || 'Token inválido ou expirado.');
                }
            } catch (error) {
                console.error('Erro:', error);
                message.textContent = `Erro: ${error.message}`;
                message.className = 'text-center text-sm text-red-500';
                setButtonLoading(false);
            }
        }
    </script>
</body>
</html>
